<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Claude Code Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>Claude Code Monitor</h1>
      <p>Claude Code 세션 실시간 이벤트와 상태를 추적하는 운영 대시보드</p>
      <div class="header-meta">
        <small id="clock"></small>
        <span id="connection" class="status-pill" data-status="reconnecting">reconnecting</span>
        <small id="connectionMeta" class="connection-meta">스트림 연결 중...</small>
      </div>
    </header>

    <main>
      <div id="emptyState" hidden></div>

      <div class="time-range-bar" id="timeRangeBar">
        <button class="range-btn active" data-range="1h">1시간</button>
        <button class="range-btn" data-range="1d">1일</button>
        <button class="range-btn" data-range="1w">1주</button>
        <button class="range-btn" data-range="1m">1달</button>
        <button class="range-btn" data-range="all">전체</button>
      </div>
      <section class="cards" id="cards"></section>

      <section class="panel">
        <div class="panel-head">
          <h2>세션 타임라인</h2>
        </div>
        <div class="timeline-scroll">
          <div id="timeline" class="timeline"></div>
          <div id="timelineTooltip" class="chart-tooltip" hidden></div>
        </div>
      </section>

      <section class="panel">
        <h2>Realtime Graphs</h2>
        <div class="charts-grid">
          <article class="chart-card">
            <h3>이벤트 처리량 (분당)</h3>
            <svg id="throughputChart" class="throughput-chart" role="img" aria-label="분당 이벤트 처리량 바 차트" viewBox="0 0 640 220" preserveAspectRatio="none"></svg>
            <div id="throughputTooltip" class="chart-tooltip" hidden></div>
          </article>
          <article class="chart-card">
            <h3>모델별 토큰 추이 (분당)</h3>
            <svg id="tokenTrendChart" class="token-trend-chart" role="img" aria-label="모델별 분당 토큰 사용량 추이 차트" viewBox="0 0 640 220" preserveAspectRatio="none"></svg>
            <div id="tokenTrendLegend" class="token-legend"></div>
          </article>
          <article class="chart-card">
            <h3>도구 호출 빈도 (Top 10)</h3>
            <svg id="toolCallChart" class="tool-call-chart" role="img" aria-label="도구별 호출 빈도 가로 바 차트" viewBox="0 0 640 220" preserveAspectRatio="none"></svg>
            <div id="toolCallTooltip" class="chart-tooltip" hidden></div>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Workflow 진행 현황</h2>
          <button id="workflowToggle" class="workflow-toggle-btn">완료된 세션 (0)</button>
        </div>
        <div class="workflow" id="workflow"></div>
        <div id="workflowCompleted" class="workflow-completed"></div>
      </section>

      <section class="panel" id="sessionsPanel">
        <h2>세션 드릴다운</h2>
        <div id="sessionsList" class="sessions-list"></div>
        <div id="sessionDetail" class="session-detail" hidden>
          <div class="session-detail-head">
            <button id="sessionDetailBack" class="session-back-btn">&larr; 목록으로</button>
            <span id="sessionDetailTitle" class="session-detail-title"></span>
            <a id="sessionDetailExport" class="session-export-btn" href="#" download title="현재 세션을 로컬 JSON으로 저장">
              Export JSON
            </a>
          </div>
          <div id="sessionDetailEvents" class="events"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head panel-head--agents">
          <h2>에이전트</h2>
          <label for="agentFilter">필터</label>
          <select id="agentFilter">
            <option value="all">all</option>
          </select>
        </div>
        <div class="table-scroll agents-table-scroll">
          <table class="agents-table">
            <thead>
              <tr>
                <th>Agent</th>
                <th>Last Seen</th>
                <th>Error</th>
                <th>Tokens</th>
                <th>Cost</th>
                <th>Last Event</th>
                <th>Latency</th>
              </tr>
            </thead>
            <tbody id="agentsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>최근 이벤트</h2>
        <div class="panel-head">
          <label for="eventStatusFilter">Status</label>
          <select id="eventStatusFilter">
            <option value="all">all</option>
            <option value="ok">ok</option>
            <option value="warning">warning</option>
            <option value="error">error</option>
          </select>
          <label for="eventLimit">Rows</label>
          <select id="eventLimit">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
          <input id="eventSearch" type="search" placeholder="event/message 검색" />
        </div>
        <small id="eventMeta"></small>
        <div id="events" class="events"></div>
      </section>

      <section class="panel">
        <h2>Alerts (warning/error)</h2>
        <div id="alerts" class="events"></div>
        <div id="alertDrilldown" class="alert-drilldown" hidden></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
